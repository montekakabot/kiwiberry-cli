name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  darwin-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Pinned: Bun 1.3.12 stopped linker-signing darwin --compile output,
      # producing binaries macOS SIGKILLs on launch. Unpin once upstream fixes.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build darwin targets
        run: |
          bun run build:darwin-arm64
          bun run build:darwin-x64

      - name: Verify darwin binaries are signed and runnable
        run: |
          set -euo pipefail
          # `codesign --verify` is too strict — it rejects linker-signed adhoc
          # binaries that actually run fine. The real regression we're guarding
          # against (Bun 1.3.12) produces output literally saying "not signed
          # at all", so match on that string.
          for target in darwin-arm64 darwin-x64; do
            bin="dist/kiwiberry-${target}"
            info="$(codesign -dvv "$bin" 2>&1)"
            if echo "$info" | grep -q 'not signed at all'; then
              echo "ERROR: $bin is completely unsigned — macOS will SIGKILL it" >&2
              echo "$info" >&2
              exit 1
            fi
            echo "$info" | grep -E 'Signature|Authority|Identifier|flags=' || true
          done
          # Secondary: actually launch the native-arch binary. macos-latest is
          # arm64, so we can run darwin-arm64 directly; x64 would need Rosetta
          # and is left to the codesign string check above.
          chmod +x dist/kiwiberry-darwin-arm64
          dist/kiwiberry-darwin-arm64 --version

      - name: Upload darwin binaries
        uses: actions/upload-artifact@v7
        with:
          name: darwin-binaries
          path: dist/kiwiberry-darwin-*
          if-no-files-found: error
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: darwin-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Lint
        run: bun run lint

      - name: Build linux and windows targets
        run: |
          bun run build:linux-x64
          bun run build:linux-arm64
          bun run build:windows-x64

      - name: Download darwin binaries
        uses: actions/download-artifact@v8
        with:
          name: darwin-binaries
          path: dist

      - name: Package release archives
        run: |
          set -euo pipefail
          mkdir -p release
          chmod +x dist/kiwiberry-darwin-arm64 dist/kiwiberry-darwin-x64

          package_unix() {
            local target="$1"
            local bin="dist/kiwiberry-${target}"
            local stage
            stage="$(mktemp -d)"
            cp "$bin" "$stage/kiwiberry"
            cp README.md "$stage/README.md"
            chmod +x "$stage/kiwiberry"
            tar -C "$stage" -czf "release/kiwiberry-${target}.tar.gz" kiwiberry README.md
            rm -rf "$stage"
          }

          package_windows() {
            local target="$1"
            local bin="dist/kiwiberry-${target}.exe"
            local stage
            stage="$(mktemp -d)"
            cp "$bin" "$stage/kiwiberry.exe"
            cp README.md "$stage/README.md"
            (cd "$stage" && zip -q "${GITHUB_WORKSPACE}/release/kiwiberry-${target}.zip" kiwiberry.exe README.md)
            rm -rf "$stage"
          }

          package_unix darwin-arm64
          package_unix darwin-x64
          package_unix linux-x64
          package_unix linux-arm64
          package_windows windows-x64

          (cd release && sha256sum kiwiberry-* > SHA256SUMS)
          cat release/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/kiwiberry-darwin-arm64.tar.gz
            release/kiwiberry-darwin-x64.tar.gz
            release/kiwiberry-linux-x64.tar.gz
            release/kiwiberry-linux-arm64.tar.gz
            release/kiwiberry-windows-x64.zip
            release/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
